# REDBASE — Postgres + API + static client.
# `docker compose up` brings up Postgres, runs migrations + seed, then the API.
# The client is built and served as static files by the API in production mode.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-redbase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-redbase}
      POSTGRES_DB: ${POSTGRES_DB:-redbase}
    ports:
      - "5432:5432"
    volumes:
      - redbase_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-redbase}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: "postgresql://${POSTGRES_USER:-redbase}:${POSTGRES_PASSWORD:-redbase}@db:5432/${POSTGRES_DB:-redbase}?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:4000/api/calendar/oauth/callback}
    ports:
      - "4000:4000"
    command: sh -c "npx prisma migrate deploy && node prisma/seed.js && node server/src/index.js"

volumes:
  redbase_pgdata:
