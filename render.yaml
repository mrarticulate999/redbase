# Render Blueprint for REDBASE.
# One free web service hosts both the Express API and the built React client.
# Database is a free Neon Postgres (set DATABASE_URL below as a secret).
#
# After connecting the repo in Render (New → Blueprint), set the `sync: false`
# secrets in the dashboard: DATABASE_URL (from Neon) and, optionally, the Google
# OAuth vars. CORS_ORIGIN can be left at the auto-filled service URL.

services:
  - type: web
    name: redbase
    runtime: node
    plan: free
    # --production=false forces devDeps (Vite, Tailwind, Prisma CLI) to install
    # even when NODE_ENV=production. Both root and client deps need this.
    buildCommand: npm install --production=false && npm --prefix client install --production=false && npm --prefix client run build && npx prisma generate
    # Apply migrations + (idempotent) seed on every deploy, then start the API.
    startCommand: npx prisma migrate deploy && node prisma/seed.js && node server/src/index.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong secret
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: BCRYPT_SALT_ROUNDS
        value: "12"
      - key: DATABASE_URL
        sync: false                  # Neon POOLED connection string (runtime)
      - key: DIRECT_URL
        sync: false                  # Neon DIRECT (non-pooled) string (migrations)
      # Per-account passwords — set strong unique values in the dashboard.
      # Var name = USERNAME_PASSWORD (grantj05=admin, abehalim/rjlee=operators).
      - key: GRANTJ05_PASSWORD
        sync: false
      - key: ABEHALIM_PASSWORD
        sync: false
      - key: RJLEE_PASSWORD
        sync: false
      # 32-byte hex key encrypting OAuth tokens at rest (keep stable once set).
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGIN
        value: "https://redbase-21zh.onrender.com"
      - key: GOOGLE_CLIENT_ID
        sync: false                  # optional (Calendar module)
      - key: GOOGLE_CLIENT_SECRET
        sync: false                  # optional
      - key: GOOGLE_REDIRECT_URI
        sync: false                  # optional: https://<service>.onrender.com/api/calendar/oauth/callback
      - key: ANTHROPIC_API_KEY
        sync: false                  # Strategy → Director Brief (claude-haiku); set in dashboard
